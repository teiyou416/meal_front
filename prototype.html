<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Decision Dashboard Prototype</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #020617;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
        padding: 24px;
      }

      .dashboard {
        max-width: 920px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .eyebrow {
        margin: 0;
        color: #047857;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 4px 0 0;
        font-size: 24px;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #059669;
        color: white;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        padding: 10px 12px;
      }

      button.secondary {
        border: 1px solid #cbd5e1;
        background: white;
        color: #334155;
      }

      button:disabled {
        background: #cbd5e1;
        cursor: not-allowed;
      }

      .message {
        border-radius: 6px;
        margin-bottom: 12px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .message.success {
        background: #ecfdf5;
        color: #065f46;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .card {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: white;
        padding: 16px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .match {
        margin: 6px 0 0;
        color: #047857;
        font-size: 13px;
        font-weight: 700;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 14px 0;
      }

      .tag {
        border-radius: 999px;
        background: #ecfdf5;
        color: #065f46;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 9px;
      }

      .reason {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 16px;
      }

      .metric {
        border-radius: 6px;
        background: #f8fafc;
        padding: 10px;
        text-align: center;
      }

      .metric span {
        display: block;
        color: #64748b;
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 2px;
        font-size: 14px;
      }

      .skeleton-line,
      .skeleton-pill,
      .skeleton-box {
        animation: pulse 1.2s ease-in-out infinite;
        background: #e2e8f0;
      }

      .skeleton-line {
        border-radius: 4px;
        height: 14px;
        margin-bottom: 10px;
      }

      .skeleton-pill {
        border-radius: 999px;
        display: inline-block;
        height: 26px;
        margin-right: 8px;
        width: 94px;
      }

      .skeleton-box {
        border-radius: 6px;
        height: 54px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
        }

        50% {
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        main {
          padding: 16px;
        }

        .header,
        .card-top {
          align-items: stretch;
          flex-direction: column;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="dashboard">
        <div class="header">
          <div>
            <p class="eyebrow">AI Decision Dashboard</p>
            <h1>Dinner recommendations</h1>
          </div>
          <button class="secondary" id="refreshButton">Refresh</button>
        </div>

        <div id="message"></div>
        <div class="grid" id="content"></div>
      </section>
    </main>

    <script>
      const recommendations = [
        {
          id: 'rec_001',
          name: 'Grilled Salmon Power Bowl',
          reason: 'A balanced dinner with lean protein and steady carbohydrates for recovery after training.',
          tags: ['High Protein', 'Omega-3', 'Balanced'],
          calories: 520,
          protein: 38,
          carbs: 42,
          fat: 18,
          confidence: 92,
        },
        {
          id: 'rec_002',
          name: 'Chicken Quinoa Salad',
          reason: 'Light enough for the evening while still supporting muscle repair with enough protein.',
          tags: ['Low Carb', 'High Protein', 'Light'],
          calories: 450,
          protein: 35,
          carbs: 32,
          fat: 15,
          confidence: 88,
        },
        {
          id: 'rec_003',
          name: 'Tofu Soba Recovery Plate',
          reason: 'A plant-forward choice with moderate carbs and a clean protein source.',
          tags: ['Plant Based', 'Moderate Carb', 'Recovery'],
          calories: 480,
          protein: 28,
          carbs: 56,
          fat: 14,
          confidence: 84,
        },
      ]

      const content = document.querySelector('#content')
      const message = document.querySelector('#message')
      const refreshButton = document.querySelector('#refreshButton')

      function renderSkeleton() {
        content.innerHTML = Array.from({ length: 3 })
          .map(
            () => `
              <article class="card">
                <div class="skeleton-line" style="width: 58%"></div>
                <div>
                  <span class="skeleton-pill"></span>
                  <span class="skeleton-pill"></span>
                </div>
                <div class="skeleton-line" style="width: 100%; margin-top: 18px"></div>
                <div class="skeleton-line" style="width: 82%"></div>
                <div class="metrics">
                  <div class="skeleton-box"></div>
                  <div class="skeleton-box"></div>
                  <div class="skeleton-box"></div>
                  <div class="skeleton-box"></div>
                </div>
              </article>
            `,
          )
          .join('')
      }

      function renderCards() {
        content.innerHTML = recommendations
          .map(
            (item) => `
              <article class="card">
                <div class="card-top">
                  <div>
                    <h2>${item.name}</h2>
                    <p class="match">${item.confidence}% match</p>
                  </div>
                  <button data-id="${item.id}">Accept as Dinner</button>
                </div>
                <div class="tags">
                  ${item.tags.map((tag) => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <p class="reason">${item.reason}</p>
                <div class="metrics">
                  <div class="metric"><span>kcal</span><strong>${item.calories}</strong></div>
                  <div class="metric"><span>Protein</span><strong>${item.protein}g</strong></div>
                  <div class="metric"><span>Carbs</span><strong>${item.carbs}g</strong></div>
                  <div class="metric"><span>Fat</span><strong>${item.fat}g</strong></div>
                </div>
              </article>
            `,
          )
          .join('')
      }

      function loadRecommendations() {
        message.innerHTML = ''
        refreshButton.disabled = true
        renderSkeleton()

        window.setTimeout(() => {
          renderCards()
          refreshButton.disabled = false
        }, 900)
      }

      content.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-id]')
        if (!button) return

        const item = recommendations.find((recommendation) => recommendation.id === button.dataset.id)
        button.disabled = true
        button.textContent = 'Saving'

        window.setTimeout(() => {
          button.disabled = false
          button.textContent = 'Accept as Dinner'
          message.innerHTML = `<p class="message success">${item.name} was added as Dinner.</p>`
        }, 500)
      })

      refreshButton.addEventListener('click', loadRecommendations)
      loadRecommendations()
    </script>
  </body>
</html>
